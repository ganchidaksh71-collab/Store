<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Itz Ghanta Gram Store</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:black;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.price{
font-weight:bold;
margin:10px 0;
}

button{
padding:10px;
border:none;
background:black;
color:white;
border-radius:6px;
width:100%;
margin-top:8px;
}

.cartBtn{
position:fixed;
bottom:20px;
right:20px;
background:black;
color:white;
padding:15px;
border-radius:50px;
}

.cart{
position:fixed;
top:0;
right:-350px;
width:300px;
height:100%;
background:white;
box-shadow:-5px 0 20px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
overflow:auto;
}

.cart.open{
right:0;
}

</style>

</head>

<body>

<header>
Itz Ghanta Gram Store
</header>

<div class="grid" id="products"></div>

<div class="cartBtn" onclick="toggleCart()">
Cart (<span id="count">0</span>)
</div>

<div class="cart" id="cart">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<button onclick="order()">Order on WhatsApp</button>

</div>

<script>

const phone="918949803348"

const upi="upi://pay?pa=ganchidaksh71@okicici&pn=GhantaGram&cu=INR"

const products=[

{
name:"Mosquito Killer Lamp",
price:309,
img:"https://m.media-amazon.com/images/I/61S5kzZ4+QL._AC_SL1500_.jpg"
},

{
name:"Mini Portable Fan",
price:299,
img:"https://images.unsplash.com/photo-1582719478250-c89cae4dc85b"
}

]

let cart=[]

const grid=document.getElementById("products")

products.forEach((p,i)=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<img src="${p.img}">

<h3>${p.name}</h3>

<div class="price">₹${p.price}</div>

<button onclick="add(${i})">Add to Cart</button>

<a href="${upi}&am=${p.price}">

<button>Pay Now</button>

</a>

`

grid.appendChild(card)

})

function add(i){

cart.push(products[i])

document.getElementById("count").innerText=cart.length

updateCart()

}

function toggleCart(){

document.getElementById("cart").classList.toggle("open")

}

function updateCart(){

let items=document.getElementById("cartItems")

items.innerHTML=""

cart.forEach(p=>{

items.innerHTML+=`<p>${p.name} - ₹${p.price}</p>`

})

}

function order(){

let items=cart.map(p=>p.name).join(",")

let msg="Order:%0A"+items

window.open("https://wa.me/"+phone+"?text="+msg)

}

</script>

</body>
  </html>
